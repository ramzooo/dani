<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Maaf Ya</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin-top: 100px;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }
    #noBtn {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
    #floatingText {
      position: absolute;
      color: red;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>  <h1>Eh hai, selamat datang 👋</h1>
  <p>Aku Ramdani minta maaf yaaa untuk semuanya 🙏</p><button id="yesBtn" onclick="alert('Makasih ya udah maafin 😭❤️')">Iya, dimaafin</button> <button id="noBtn">Nggak dimaafin</button>

  <div id="floatingText">Eits ga kena 😜</div>  <script>
    const noBtn = document.getElementById("noBtn");
    const floatingText = document.getElementById("floatingText");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";

      floatingText.style.left = (x + 20) + "px";
      floatingText.style.top = (y - 20) + "px";
      floatingText.style.display = "block";
    });
  </script></body>
</html>
